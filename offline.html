<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Franklin Research - Offline</title>
  <meta name="theme-color" content="#0b1110">
  <style>
    body {
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(145deg, #081110, #0d1823 54%, #11140f);
      color: #f4efe7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      text-align: center;
    }
    section {
      width: min(100%, 420px);
      border: 1px solid rgba(216, 174, 95, 0.28);
      border-radius: 22px;
      padding: 26px;
      background: rgba(24, 28, 25, 0.78);
    }
    img {
      width: 88px;
      height: 88px;
      border-radius: 20px;
    }
    h1 {
      margin: 18px 0 10px;
      font-size: 30px;
    }
    p {
      margin: 0;
      color: #b8b3a9;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <section>
    <img src="./assets/apple-touch-icon.png" alt="">
    <h1>أنت غير متصل</h1>
    <p>لا يتم عرض أسعار أو بيانات مالية قديمة كأنها حالية. أعد الاتصال بالإنترنت ثم افتح Franklin Research مرة أخرى.</p>
  </section>
</body>
</html>
