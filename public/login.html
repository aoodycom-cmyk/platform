<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Franklin Research - Private Access</title>
  <meta name="theme-color" content="#0b1110">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Franklin Research">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1110;
      --panel: rgba(24, 28, 25, 0.78);
      --line: rgba(211, 174, 95, 0.28);
      --gold: #d8ae5f;
      --text: #f4efe7;
      --muted: #b8b3a9;
      --danger: #df8079;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: max(22px, env(safe-area-inset-top)) 22px max(22px, env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 20% 12%, rgba(216, 128, 50, 0.26), transparent 34%),
        radial-gradient(circle at 92% 86%, rgba(68, 91, 60, 0.38), transparent 38%),
        linear-gradient(145deg, #081110, #0d1823 54%, #11140f);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }
    main {
      width: min(100%, 430px);
      display: grid;
      gap: 18px;
      text-align: center;
    }
    .icon {
      width: 116px;
      height: 116px;
      margin: 0 auto 6px;
      border-radius: 26px;
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.42);
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 24px;
      background: var(--panel);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(24px);
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 10vw, 48px);
      line-height: 0.96;
      letter-spacing: 0;
    }
    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }
    form {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }
    input, button {
      width: 100%;
      min-height: 54px;
      border-radius: 12px;
      font: inherit;
    }
    input {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 0 16px;
      direction: ltr;
      text-align: center;
    }
    button {
      border: 0;
      background: #f4efe7;
      color: #101411;
      font-weight: 850;
      cursor: pointer;
    }
    .error {
      min-height: 22px;
      color: var(--danger);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <img class="icon" src="./assets/apple-touch-icon.png" alt="">
    <section class="card">
      <p class="eyebrow">Private Beta</p>
      <h1>Franklin Research</h1>
      <p>منصة أبحاث الأسهم الخاصة. أدخل كلمة الدخول لفتح التطبيق.</p>
      <form id="loginForm" autocomplete="off">
        <input id="password" name="password" type="password" placeholder="Access password" autocomplete="current-password" required>
        <button type="submit">دخول</button>
        <div id="error" class="error" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>
  <script type="module" src="./src/login.js"></script>
</body>
</html>
