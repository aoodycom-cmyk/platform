services:
  - type: web
    name: franklin-research
    runtime: node
    plan: starter
    buildCommand: "npm install --omit=dev"
    startCommand: "npm start"
    healthCheckPath: "/api/health"
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: FMP_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: APP_ACCESS_PASSWORD
        sync: false
      - key: APP_SESSION_SECRET
        generateValue: true
      - key: APP_ORIGIN
        sync: false
